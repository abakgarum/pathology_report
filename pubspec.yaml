name: pathology_report
description: A modern pathology report creation application for doctors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  google_fonts: ^6.1.0
  pdf: ^3.10.8
  printing: ^5.12.0
  uuid: ^4.2.1
  record: 4.4.4
  just_audio: ^0.9.40
  http: ^1.2.1
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_dotenv: ^5.1.0
  audioplayers: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
