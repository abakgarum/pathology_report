name: pathology_report
description: A modern pathology report creation application for doctors.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  google_fonts: ^6.1.0
  pdf: ^3.10.8
  printing: ^5.12.0
  uuid: ^4.2.1
  record: 4.4.4
  just_audio: ^0.9.40
  http: ^1.2.1
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_dotenv: ^5.1.0
  audioplayers: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^7.3.0
  file_selector: ^1.0.3
  archive: ^3.6.1
  barcode_widget: ^2.0.4
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

# Generates platform-native app icons from a single 1024x1024 PNG master.
# Run with:  dart run flutter_launcher_icons
# Source PNG is produced from tools/icon-source.svg via tools/setup_icon.sh.
flutter_launcher_icons:
  image_path: "tools/icon-master.png"
  macos:
    generate: true
    image_path: "tools/icon-master.png"
  windows:
    generate: true
    image_path: "tools/icon-master.png"
    icon_size: 256
  android: false
  ios: false
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - .env
